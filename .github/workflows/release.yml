name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ env.TARGET }}
      - name: Resolve release metadata
        id: metadata
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Verify synchronized release version
        run: node scripts/verify-release-version.mjs "$GITHUB_REF_NAME"
      - name: Build release binary
        run: cargo build --release --locked -p beacon-cli --target "$TARGET"
      - name: Package release archive
        run: |
          artifact="beacon-${GITHUB_REF_NAME}-${TARGET}"
          mkdir -p "dist/${artifact}"
          cp "target/${TARGET}/release/beacon" "dist/${artifact}/beacon"
          cp README.md LICENSE "dist/${artifact}/"
          tar -C dist -czf "dist/${artifact}.tar.gz" "$artifact"
          (cd dist && shasum -a 256 "${artifact}.tar.gz" > "${artifact}.tar.gz.sha256")
      - name: Upload shared release artifact
        uses: actions/upload-artifact@v4
        with:
          name: beacon-release
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Download shared release artifact
        uses: actions/download-artifact@v4
        with:
          name: beacon-release
          path: dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
          TARGET: aarch64-apple-darwin
        run: |
          gh release create "$VERSION" \
            "dist/beacon-${VERSION}-${TARGET}.tar.gz" \
            "dist/beacon-${VERSION}-${TARGET}.tar.gz.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --title "Beacon ${VERSION}"

  publish-npm:
    needs: [build, release]
    runs-on: macos-15
    permissions:
      contents: read
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      VERSION: ${{ needs.build.outputs.version }}
      TAG: ${{ github.ref_name }}
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
        if: env.NODE_AUTH_TOKEN != ''
      - uses: actions/setup-node@v6
        if: env.NODE_AUTH_TOKEN != ''
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Download shared release artifact
        if: env.NODE_AUTH_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: beacon-release
          path: dist
      - name: Publish npm wrapper
        if: env.NODE_AUTH_TOKEN != ''
        run: |
          tar -C dist -xzf "dist/beacon-${TAG}-${TARGET}.tar.gz"
          node scripts/stage-npm-package.mjs \
            "dist/beacon-${TAG}-${TARGET}/beacon" \
            /tmp/beacon-npm-package \
            "$VERSION"
          npm publish /tmp/beacon-npm-package --access public --provenance

  update-homebrew-tap:
    needs: [build, release]
    runs-on: macos-15
    permissions:
      contents: read
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      VERSION: ${{ needs.build.outputs.version }}
      TAG: ${{ github.ref_name }}
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
        if: env.HOMEBREW_TAP_TOKEN != ''
        with:
          path: beacon
      - name: Download shared release artifact
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: beacon-release
          path: dist
      - name: Check out Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v7
        with:
          repository: LioRael/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          sha256="$(awk '{print $1}' "dist/beacon-${TAG}-${TARGET}.tar.gz.sha256")"
          mkdir -p homebrew-tap/Formula
          node beacon/scripts/render-homebrew-formula.mjs \
            "$VERSION" "$sha256" homebrew-tap/Formula/beacon.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/beacon.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore: update beacon to ${VERSION}"
          git push
