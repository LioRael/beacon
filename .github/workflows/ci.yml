name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: node --test packages/npm/test/*.test.mjs tests/*.test.mjs
      - name: Validate generated Homebrew Formula
        run: |
          node scripts/render-homebrew-formula.mjs \
            0.4.0 \
            aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            /tmp/beacon.rb
          ruby -c /tmp/beacon.rb
      - name: Verify synchronized package versions
        run: node scripts/verify-release-version.mjs v0.4.0
